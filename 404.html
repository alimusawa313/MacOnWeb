<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOn — Page not found</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/png" href="macon-icon.png">
<script>
  (function () {
    var theme = 'light';
    try {
      var saved = localStorage.getItem('macon-theme');
      theme = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
    var tc = document.querySelector('meta[name="theme-color"]');
    if (tc) tc.setAttribute('content', theme === 'dark' ? '#14151c' : '#f4f4f7');
  })();
</script>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/notfound.css">
</head>
<body class="nf">
  <div>
    <a href="/"><img src="macon-icon.png" alt="MacOn" class="nf-logo"></a>
    <p class="nf-code">ERROR 404</p>
    <h1>This page went off the grid.</h1>
    <p>The link may be broken or the page may have moved. Let's get you back to something that builds.</p>
    <a href="/" class="btn btn-primary">Back to home</a>
    <div class="nf-links">
      <a href="/docs">Docs</a>
      <a href="/about">About</a>
      <a href="https://github.com/alimusawa313/MacON">GitHub</a>
    </div>
  </div>
</body>
</html>
